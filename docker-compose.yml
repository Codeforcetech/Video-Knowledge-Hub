services:
  db:
    image: postgres:16
    container_name: video-knowledge-hub-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: video_knowledge_hub
    volumes:
      - vkh_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d video_knowledge_hub"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  vkh_postgres:

